name: affinity-proteomics
description: SDRF template for affinity-based proteomics experiments (Olink, SomaScan). This is the base template for all affinity proteomics experiments.
documentation: |
  The affinity-proteomics template is one of two usable-alone technology templates. It covers
  antibody-based (Olink PEA) and aptamer-based (SomaScan) proteomics platforms.

  Use this template directly for affinity experiments and combine with an organism template.

  Key differences from ms-proteomics:
  - No sample preparation chemistry columns (no digestion, reduction, alkylation).
  - `characteristics[sample type]` is required to distinguish biological samples from
    controls and reference materials used for assay calibration/quality control.
  - `comment[platform]` identifies the specific instrument/platform.
  - `comment[quantification unit]`: NPX for Olink, RFU for SomaScan.
  - `comment[dilution]`: Recommended only for SomaScan workflows.
  - `comment[lot number]`: Optional reagent lot for traceability.
  - `comment[normalization method]`: How data was normalized (plate control, bridge, etc.).

  Mutually exclusive with ms-proteomics.
