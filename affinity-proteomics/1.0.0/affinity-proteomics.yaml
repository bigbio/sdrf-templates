version: 1.0.0
extends: sample-metadata@>=1.0.0
usable_alone: true
layer: technology
mutually_exclusive_with:
  - ms-proteomics
validators:
  - validator_name: min_columns
    params:
      min_columns: 8
columns:
  - name: characteristics[sample type]
    description: Distinguishes biological samples from controls/reference materials for assay interpretation and quality control
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - pride
          error_level: error
          description: Sample type should be a valid PRIDE ontology term
          examples:
            - negative control
            - positive control
            - calibrator
            - reference
            - standard
            - buffer control

  - name: comment[platform]
    description: Affinity proteomics platform used (e.g. Olink Explore HT, SomaScan Assay 7K)
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: single_cardinality_validator
        params: {}
      - validator_name: ontology
        params:
          ontologies:
            - pride
          error_level: error
          description: The platform should be a valid PRIDE ontology term for affinity platforms
          examples:
            - Olink Explore HT
            - Olink Target 96
            - SomaScan Assay 11K

  - name: comment[instrument]
    ontology_accession: MS:1000031
    description: Instrument used for data acquisition (e.g. sequencer, qPCR machine, microarray reader)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - ms
            - pride
          error_level: warning
          description: The instrument should be a valid PSI-MS ontology term
          examples:
            - Illumina NovaSeq X
            - Illumina NextSeq 2000
            - Agilent SureScan Microarray Scanner

  - name: comment[quantification unit]
    ontology_accession: PRIDE:0000392
    description: Unit of quantification for the assay (platform-specific)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - NPX
            - RFU
          error_level: warning
          description: Quantification unit

  - name: comment[plate]
    description: Plate identifier for batch effect analysis
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Plate identifier
          examples:
            - 1
            - 2

  - name: comment[normalization method]
    description: Normalization method applied to quantification values
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Normalization method
          examples:
            - plate control normalized
            - bridge normalized
            - median normalization
            - not normalized

  - name: comment[dilution]
    ontology_accession: OBI:0002483
    description: Sample dilution factor used (recommended only for SomaScan workflows)
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^(0.005%|0.5%|20%|40%)$
          description: Standard SomaScan dilution factors
          examples:
            - 0.005%
            - 0.5%
            - 20%
            - 40%

  - name: comment[lot number]
    description: Reagent lot number for traceability
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Lot number
          examples:
            - SS-2023-001
            - lot_12345
